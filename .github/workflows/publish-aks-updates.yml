# .github/workflows/publish-aks-updates.yml
name: Publish AKS updates to WordPress (PowerShell)

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours for page updates
    - cron: '0 6 * * *'     # Daily 06:00 UTC — includes VHD CVE refresh
    - cron: '0 9 * * 0'     # Sunday 09:00 UTC for weekly digest
  workflow_dispatch:
    inputs:
      post_weekly_digest:
        description: 'Post Weekly Digest to WordPress'
        required: false
        type: boolean
        default: false
      refresh_cve_data:
        description: 'Refresh CVE data (AKS releases + VHD node images)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # Allow pushing archive files back to repository
  models: read     # Allow calling GitHub Models inference API
  issues: write    # Allow creating issues for rate-limit alerts

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      WP_USER_AGENT: azure-aks-tracker-action/1.0 (https://github.com/PixelRobots/azure-aks-tracker)
      WP_CONNECT_TIMEOUT_SECONDS: "30"
      WP_VERIFY_MAX_TIME_SECONDS: "120"
      WP_POST_MAX_TIME_SECONDS: "180"
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell 7 is preinstalled
        run: pwsh -v

      - name: Generate HTML JSON (content + hash)
        id: gen
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OpenAIKey: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_APIURI:       ${{ secrets.AZURE_OPENAI_APIURI }}
          AZURE_OPENAI_KEY:          ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_API_VERSION:  ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT:   ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          # CVE_ONLY=true skips GitHub/docs/AI fetch and regenerates only the CVE section.
          # Enabled when the refresh_cve_data checkbox is ticked manually.
          CVE_ONLY: ${{ github.event.inputs.refresh_cve_data == 'true' && 'true' || '' }}
          # CVE_REFRESH_VHD=true fetches VHD node-image CVE data (26 OS types) in addition to
          # the standard container-image CVE data. When unset, only container-image CVEs are fetched.
          # Enabled automatically on the daily 06:00 UTC schedule or when the checkbox is ticked.
          CVE_REFRESH_VHD: ${{ (github.event.schedule == '0 6 * * *' || github.event.inputs.refresh_cve_data == 'true') && 'true' || '' }}
        run: |
          ./.github/scripts/generate-aks-updates.ps1 1> out.json
          Write-Host "Generated out.json ($((Get-Item out.json).Length) bytes)"
          $json = Get-Content out.json -Raw | ConvertFrom-Json
          if ($json.cve_only) {
            Set-Content -LiteralPath cve-section.html -Value $json.cve_section_html -Encoding UTF8
            Set-Content -LiteralPath wordpress-cve-section.html -Value $json.cve_section_html -Encoding UTF8
            Add-Content -Path $env:GITHUB_OUTPUT -Value "cve_only=true"
          } else {
            Set-Content -LiteralPath content.html        -Value $json.html                 -Encoding UTF8
            Set-Content -LiteralPath digest-docs.html    -Value $json.digest_docs_html     -Encoding UTF8
            Set-Content -LiteralPath digest-docs.title   -Value $json.digest_docs_title    -Encoding UTF8
            Set-Content -LiteralPath wordpress-cve-section.html -Value $json.cve_section_html -Encoding UTF8
            Add-Content -Path $env:GITHUB_OUTPUT -Value "hash=$($json.hash)"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "digest_docs_count=$($json.digest_docs_count)"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "cve_only=false"
          }

      - name: Commit generated caches
        if: steps.gen.conclusion == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TMP_CACHE_DIR="$(mktemp -d)"
          FILES_TO_ADD=""
          if [ -f vhd-cache.json ]; then
            cp vhd-cache.json "$TMP_CACHE_DIR/vhd-cache.json"
            FILES_TO_ADD="$FILES_TO_ADD vhd-cache.json"
          else
            echo "No vhd-cache.json produced."
          fi
          if [ -f docs-summary-cache.json ]; then
            cp docs-summary-cache.json "$TMP_CACHE_DIR/docs-summary-cache.json"
            FILES_TO_ADD="$FILES_TO_ADD docs-summary-cache.json"
          else
            echo "No docs-summary-cache.json produced."
          fi
          if [ -f releases-summary-cache.json ]; then
            cp releases-summary-cache.json "$TMP_CACHE_DIR/releases-summary-cache.json"
            FILES_TO_ADD="$FILES_TO_ADD releases-summary-cache.json"
          else
            echo "No releases-summary-cache.json produced."
          fi

          if [ -z "$FILES_TO_ADD" ]; then
            echo "No cache files produced — skipping cache commit."
            exit 0
          fi

          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"
          if [ -f "$TMP_CACHE_DIR/vhd-cache.json" ]; then
            cp "$TMP_CACHE_DIR/vhd-cache.json" vhd-cache.json
          fi
          if [ -f "$TMP_CACHE_DIR/docs-summary-cache.json" ]; then
            cp "$TMP_CACHE_DIR/docs-summary-cache.json" docs-summary-cache.json
          fi
          if [ -f "$TMP_CACHE_DIR/releases-summary-cache.json" ]; then
            cp "$TMP_CACHE_DIR/releases-summary-cache.json" releases-summary-cache.json
          fi

          git add $FILES_TO_ADD
          if git diff --staged --quiet; then
            echo "Cache files unchanged — nothing to commit."
          else
            git commit -m "chore: update generated caches [skip ci]"
            git push
            echo "Generated caches committed and pushed."
          fi

      - name: Commit WordPress CVE source
        if: steps.gen.conclusion == 'success'
        run: |
          if [ -f wordpress-cve-section.html ]; then
            TMP_CVE_SOURCE="$(mktemp)"
            cp wordpress-cve-section.html "$TMP_CVE_SOURCE"
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            mkdir -p wordpress
            cp "$TMP_CVE_SOURCE" wordpress/aks-cve-section.html
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add wordpress/aks-cve-section.html
            if git diff --staged --quiet; then
              echo "WordPress CVE source unchanged — nothing to commit."
            else
              git commit -m "chore: update WordPress CVE source [skip ci]"
              git push
              echo "WordPress CVE source committed and pushed."
            fi
          else
            echo "No wordpress-cve-section.html produced — skipping CVE source commit."
          fi

      - name: Update WordPress page
        if: steps.gen.conclusion == 'success' && steps.gen.outputs.cve_only != 'true'
        run: |
          WP_API="${{ secrets.WP_URL }}/wp-json/wp/v2/pages/${{ secrets.WP_PAGE_ID }}"
          DESIRED_HASH="${{ steps.gen.outputs.hash }}"

          # Build payload — send raw HTML without block wrappers to avoid WordPress
          # block-parser errors that can cause 500 responses on large HTML content.
          jq -n --rawfile content content.html \
            '{content: $content, status: "publish"}' \
            > "$RUNNER_TEMP/wp-payload.json"

          echo "content.html size: $(wc -c < content.html) bytes"
          echo "wp-payload.json size: $(wc -c < "$RUNNER_TEMP/wp-payload.json") bytes"

          # Validate JSON before sending
          if ! jq empty "$RUNNER_TEMP/wp-payload.json"; then
            echo "ERROR: wp-payload.json is not valid JSON — aborting"
            exit 1
          fi

          verify_page_update() {
            VERIFY_RESPONSE=$(mktemp)
            VERIFY_HEADERS=$(mktemp)
            VERIFY_CODE=$(curl -s -w "%{http_code}" \
              --http1.1 \
              --connect-timeout "$WP_CONNECT_TIMEOUT_SECONDS" \
              --max-time "$WP_VERIFY_MAX_TIME_SECONDS" \
              -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
              -H "Accept: application/json" \
              -H "User-Agent: $WP_USER_AGENT" \
              -D "$VERIFY_HEADERS" \
              "$WP_API" -o "$VERIFY_RESPONSE")

            if [ "$VERIFY_CODE" -ge 200 ] && [ "$VERIFY_CODE" -lt 300 ]; then
              REMOTE_HASH=$(jq -r .content.rendered "$VERIFY_RESPONSE" | sha256sum | cut -d' ' -f1)
              REMOTE_MODIFIED=$(jq -r '.modified_gmt // empty' "$VERIFY_RESPONSE")
              echo "Verification GET succeeded (HTTP $VERIFY_CODE)"
              echo "Desired hash: $DESIRED_HASH"
              echo "Remote  hash: $REMOTE_HASH"
              if [ -n "$REMOTE_MODIFIED" ] && [ "$REMOTE_MODIFIED" != "null" ]; then
                echo "Remote modified_gmt: $REMOTE_MODIFIED"
              fi
              rm -f "$VERIFY_RESPONSE"
              rm -f "$VERIFY_HEADERS"

              if [ "$REMOTE_HASH" = "$DESIRED_HASH" ]; then
                echo "WordPress page content matches the desired hash after the failed POST."
                return 0
              fi
            else
              echo "Verification GET failed with HTTP $VERIFY_CODE"
              echo "--- Verification response ---"
              head -c 2000 "$VERIFY_RESPONSE"
              echo ""
              echo "--- Verification headers ---"
              head -n 50 "$VERIFY_HEADERS"
              echo ""
              rm -f "$VERIFY_RESPONSE"
              rm -f "$VERIFY_HEADERS"
            fi

            return 1
          }

          WP_RESPONSE=$(mktemp)
          WP_RESPONSE_HEADERS=$(mktemp)
          attempt=1
          max_retries=3
          retry_delay=5
          while [ $attempt -le $max_retries ]; do
            HTTP_CODE=$(curl -s -w "%{http_code}" -X POST "$WP_API" \
              --http1.1 \
              --connect-timeout "$WP_CONNECT_TIMEOUT_SECONDS" \
              --max-time "$WP_POST_MAX_TIME_SECONDS" \
              -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -H "User-Agent: $WP_USER_AGENT" \
              -H "Expect:" \
              -D "$WP_RESPONSE_HEADERS" \
              --data-binary @"$RUNNER_TEMP/wp-payload.json" \
              -o "$WP_RESPONSE")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "WordPress page updated successfully (HTTP $HTTP_CODE) on attempt $attempt"
              break
            fi
            echo "Attempt $attempt failed with HTTP $HTTP_CODE"
            echo "--- WordPress error response ---"
            head -c 2000 "$WP_RESPONSE"
            echo ""
            echo "--- WordPress response headers ---"
            head -n 50 "$WP_RESPONSE_HEADERS"
            echo ""
            if verify_page_update; then
              echo "Treating HTTP $HTTP_CODE as success because the page update was persisted."
              break
            fi
            if [ $attempt -lt $max_retries ]; then
              echo "Retrying in $retry_delay seconds..."
              sleep $retry_delay
              retry_delay=$((retry_delay * 2))
            else
              echo "Failed after $max_retries attempts"
              rm -f "$WP_RESPONSE"
              rm -f "$WP_RESPONSE_HEADERS"
              exit 1
            fi
            attempt=$((attempt + 1))
          done
          rm -f "$WP_RESPONSE"
          rm -f "$WP_RESPONSE_HEADERS"

      - name: Archive weekly docs digest
        if: (github.event.schedule == '0 9 * * 0' || github.event.inputs.post_weekly_digest == 'true') && steps.gen.outputs.cve_only != 'true' && steps.gen.outputs.digest_docs_count != '0'
        run: |
          TMP_WEEKLY_DIGEST="$(mktemp)"
          cp digest-docs.html "$TMP_WEEKLY_DIGEST"
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"

          # Create archive directory
          mkdir -p archive
    
          # Save docs digest with date in filename
          ARCHIVE_DATE=$(date +%Y-%m-%d)
          SRC="digest-docs.html"
          DST="archive/weekly-digest-docs-${ARCHIVE_DATE}.html"
          cp "$TMP_WEEKLY_DIGEST" "$DST"
          echo "Saved digest-docs.html to $DST"
    
          # Commit and push archive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DST"
          if git diff --staged --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "Archive weekly docs digest for $ARCHIVE_DATE"
            git push
          fi
    
      - name: Create weekly WP docs post
        if: (github.event.schedule == '0 9 * * 0' || github.event.inputs.post_weekly_digest == 'true') && steps.gen.outputs.cve_only != 'true' && steps.gen.outputs.digest_docs_count != '0'
        run: |
          WP_API="${{ secrets.WP_URL }}/wp-json/wp/v2/posts"
          if [ ! -s "digest-docs.html" ]; then
            echo "docs: no content — skipping."
            exit 0
          fi

          TITLE=$(cat "digest-docs.title")
          # Build payload — send raw HTML without block wrappers to avoid WordPress
          # block-parser errors that can cause 500 responses on large HTML content.
          jq -n --rawfile content "digest-docs.html" --arg title "$TITLE" \
            '{title: $title,
              status: "publish",
              categories: [261],
              content: $content,
              comment_status: "closed"}' \
            > "$RUNNER_TEMP/wp-docs.json"

          # Validate JSON before sending
          if ! jq empty "$RUNNER_TEMP/wp-docs.json"; then
            echo "ERROR: wp-docs.json is not valid JSON — aborting"
            exit 1
          fi

          echo "Posting docs digest to WordPress..."
          echo "digest-docs.html size: $(wc -c < digest-docs.html) bytes"
          echo "wp-docs.json size: $(wc -c < "$RUNNER_TEMP/wp-docs.json") bytes"
          LOCAL_DIGEST_HASH=$(sha256sum digest-docs.html | cut -d' ' -f1)

          verify_created_post() {
            POST_ID=$(jq -r '.id // empty' "$WP_RESPONSE")
            POST_STATUS=$(jq -r '.status // empty' "$WP_RESPONSE")
            POST_TYPE=$(jq -r '.type // empty' "$WP_RESPONSE")
            POST_LINK=$(jq -r '.link // empty' "$WP_RESPONSE")

            if [ -z "$POST_ID" ] || [ "$POST_STATUS" != "publish" ] || [ "$POST_TYPE" != "post" ] || [ -z "$POST_LINK" ]; then
              echo "ERROR: WordPress response did not describe a published post."
              echo "Post id: ${POST_ID:-<missing>}"
              echo "Post status: ${POST_STATUS:-<missing>}"
              echo "Post type: ${POST_TYPE:-<missing>}"
              echo "Post link: ${POST_LINK:-<missing>}"
              return 1
            fi

            VERIFY_RESPONSE=$(mktemp)
            VERIFY_HEADERS=$(mktemp)
            VERIFY_CODE=$(curl -s -w "%{http_code}" \
              --http1.1 \
              --connect-timeout "$WP_CONNECT_TIMEOUT_SECONDS" \
              --max-time "$WP_VERIFY_MAX_TIME_SECONDS" \
              -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
              -H "Accept: application/json" \
              -H "User-Agent: $WP_USER_AGENT" \
              -D "$VERIFY_HEADERS" \
              "$WP_API/$POST_ID?context=edit" -o "$VERIFY_RESPONSE")

            if [ "$VERIFY_CODE" -lt 200 ] || [ "$VERIFY_CODE" -ge 300 ]; then
              echo "ERROR: Verification GET for WordPress post $POST_ID failed with HTTP $VERIFY_CODE"
              echo "--- Verification response ---"
              head -c 2000 "$VERIFY_RESPONSE"
              echo ""
              echo "--- Verification headers ---"
              head -n 50 "$VERIFY_HEADERS"
              echo ""
              rm -f "$VERIFY_RESPONSE"
              rm -f "$VERIFY_HEADERS"
              return 1
            fi

            VERIFY_ID=$(jq -r '.id // empty' "$VERIFY_RESPONSE")
            VERIFY_STATUS=$(jq -r '.status // empty' "$VERIFY_RESPONSE")
            VERIFY_TYPE=$(jq -r '.type // empty' "$VERIFY_RESPONSE")
            VERIFY_LINK=$(jq -r '.link // empty' "$VERIFY_RESPONSE")
            VERIFY_RAW_HASH=$(jq -j '.content.raw // empty' "$VERIFY_RESPONSE" | sha256sum | cut -d' ' -f1)

            echo "Verification GET succeeded (HTTP $VERIFY_CODE)"
            echo "WordPress post id: $POST_ID"
            echo "WordPress post status: $VERIFY_STATUS"
            echo "WordPress post link: $VERIFY_LINK"

            if [ "$VERIFY_ID" != "$POST_ID" ] || [ "$VERIFY_STATUS" != "publish" ] || [ "$VERIFY_TYPE" != "post" ]; then
              echo "ERROR: Verification GET did not return the expected published post."
              rm -f "$VERIFY_RESPONSE"
              rm -f "$VERIFY_HEADERS"
              return 1
            fi

            if [ "$VERIFY_RAW_HASH" != "$LOCAL_DIGEST_HASH" ]; then
              echo "ERROR: Verified WordPress post content does not match digest-docs.html."
              echo "Local digest hash: $LOCAL_DIGEST_HASH"
              echo "Remote raw hash:   $VERIFY_RAW_HASH"
              rm -f "$VERIFY_RESPONSE"
              rm -f "$VERIFY_HEADERS"
              return 1
            fi

            rm -f "$VERIFY_RESPONSE"
            rm -f "$VERIFY_HEADERS"
            return 0
          }

          WP_RESPONSE=$(mktemp)
          WP_RESPONSE_HEADERS=$(mktemp)
          attempt=1
          max_retries=3
          retry_delay=5
          while [ $attempt -le $max_retries ]; do
            HTTP_CODE=$(curl -s -w "%{http_code}" -X POST "$WP_API" \
              --http1.1 \
              --connect-timeout "$WP_CONNECT_TIMEOUT_SECONDS" \
              --max-time "$WP_POST_MAX_TIME_SECONDS" \
              -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -H "User-Agent: $WP_USER_AGENT" \
              -H "Expect:" \
              -D "$WP_RESPONSE_HEADERS" \
              --data-binary @"$RUNNER_TEMP/wp-docs.json" \
              -o "$WP_RESPONSE")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              if [ "$HTTP_CODE" != "201" ]; then
                echo "WordPress returned HTTP $HTTP_CODE for post creation; validating response before treating it as success."
              fi

              if ! jq empty "$WP_RESPONSE"; then
                echo "ERROR: WordPress returned HTTP $HTTP_CODE but the response was not valid JSON."
                echo "--- WordPress response ---"
                head -c 2000 "$WP_RESPONSE"
                echo ""
                echo "--- WordPress response headers ---"
                head -n 50 "$WP_RESPONSE_HEADERS"
                echo ""
                rm -f "$WP_RESPONSE"
                rm -f "$WP_RESPONSE_HEADERS"
                exit 1
              elif verify_created_post; then
                echo "WordPress post created and verified successfully (HTTP $HTTP_CODE) on attempt $attempt"
                break
              else
                echo "ERROR: WordPress returned HTTP $HTTP_CODE but post verification failed."
                echo "--- WordPress response ---"
                head -c 2000 "$WP_RESPONSE"
                echo ""
                echo "--- WordPress response headers ---"
                head -n 50 "$WP_RESPONSE_HEADERS"
                echo ""
                rm -f "$WP_RESPONSE"
                rm -f "$WP_RESPONSE_HEADERS"
                exit 1
              fi
            else
              echo "Attempt $attempt failed with HTTP $HTTP_CODE"
              echo "--- WordPress error response ---"
              head -c 2000 "$WP_RESPONSE"
              echo ""
              echo "--- WordPress response headers ---"
              head -n 50 "$WP_RESPONSE_HEADERS"
              echo ""
            fi

            if [ $attempt -lt $max_retries ]; then
              echo "Retrying in $retry_delay seconds..."
              sleep $retry_delay
              retry_delay=$((retry_delay * 2))
            else
              echo "Failed after $max_retries attempts"
              rm -f "$WP_RESPONSE"
              rm -f "$WP_RESPONSE_HEADERS"
              exit 1
            fi
            attempt=$((attempt + 1))
          done
          rm -f "$WP_RESPONSE"
          rm -f "$WP_RESPONSE_HEADERS"
