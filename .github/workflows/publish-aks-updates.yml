# .github/workflows/publish-aks-updates.yml
name: Publish AKS updates to WordPress (PowerShell)

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours for page updates
    - cron: '0 6 * * *'     # Daily 06:00 UTC — includes VHD CVE refresh
    - cron: '0 9 * * 0'     # Sunday 09:00 UTC for weekly digest
  workflow_dispatch:
    inputs:
      post_weekly_digest:
        description: 'Post Weekly Digest to WordPress'
        required: false
        type: boolean
        default: false
      refresh_cve_data:
        description: 'Refresh CVE data (AKS releases + VHD node images)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # Allow pushing archive files back to repository
  models: read     # Allow calling GitHub Models inference API

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell 7 is preinstalled
        run: pwsh -v

      - name: Generate HTML JSON (content + hash)
        id: gen
        # Skip on manual CVE-only dispatch — that path has its own step below
        if: github.event.inputs.refresh_cve_data != 'true' || github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OpenAIKey: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_APIURI:       ${{ secrets.AZURE_OPENAI_APIURI }}
          AZURE_OPENAI_KEY:          ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_API_VERSION:  ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT:   ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          # CVE_REFRESH_VHD=true tells the script to fetch VHD node-image CVE data.
          # Runs daily at 06:00 UTC automatically, or on-demand via the checkbox.
          CVE_REFRESH_VHD: ${{ (github.event.schedule == '0 6 * * *' || github.event.inputs.refresh_cve_data == 'true') && 'true' || '' }}
        run: |
          ./.github/scripts/generate-aks-updates.ps1 1> out.json
          Write-Host "Generated out.json ($((Get-Item out.json).Length) bytes)"
          $json = Get-Content out.json -Raw | ConvertFrom-Json
          Set-Content -LiteralPath content.html -Value $json.html -Encoding UTF8
          Set-Content -LiteralPath digest.html -Value $json.digest_html -Encoding UTF8
          Set-Content -LiteralPath digest.title -Value $json.digest_title -Encoding UTF8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "hash=$($json.hash)"

      # ---- CVE-only refresh (manual checkbox only) ----------------------------
      # Fetches fresh CVE data, splices it into the live WordPress page between
      # <!-- CVE_SECTION_START --> / <!-- CVE_SECTION_END --> markers, and pushes.
      - name: CVE-only refresh
        id: cve_only
        if: github.event.inputs.refresh_cve_data == 'true' && github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CVE_ONLY: 'true'
          CVE_REFRESH_VHD: 'true'
        run: |
          # Generate only the CVE section HTML
          ./.github/scripts/generate-aks-updates.ps1 1> cve_out.json
          $cveJson = Get-Content cve_out.json -Raw | ConvertFrom-Json
          $newCveHtml = $cveJson.cve_html
          Set-Content -LiteralPath new_cve.html -Value $newCveHtml -Encoding UTF8
          Write-Host "CVE HTML generated ($($newCveHtml.Length) chars)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "cve_ready=true"

      - name: Splice CVE section into WordPress page
        if: steps.cve_only.outputs.cve_ready == 'true'
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_APP_PASSWORD }}
          WP_URL:  ${{ secrets.WP_URL }}
          WP_ID:   ${{ secrets.WP_PAGE_ID }}
        run: |
          # Fetch current page content
          curl -sSf -u "$WP_USER:$WP_PASS" "$WP_URL/wp-json/wp/v2/pages/$WP_ID" -o current_page.json

          # Extract rendered HTML and decode HTML entities for the markers
          CURRENT_HTML=$(jq -r '.content.rendered' current_page.json)

          # Replace content between the CVE section markers
          NEW_CVE=$(cat new_cve.html)
          BLOCK="    <!-- CVE_SECTION_START -->\n    <div class=\"aks-tab-panel\" id=\"aks-tab-cve\">\n      <h2>AKS CVE Security<\/h2>\n      <p>Live vulnerability data for the latest AKS release, sourced from the <strong>AKS Vulnerability Data API<\/strong> (Public Preview). Shows unique active CVEs and improvements from the previous release across all AKS platform containers.<\/p>\n      $NEW_CVE\n    <\/div>\n    <!-- CVE_SECTION_END -->"

          # Use Python for reliable multi-line regex replace
          python3 - <<'PYEOF'
          import re, json, sys
          with open('current_page.json') as f:
            page = json.load(f)
          html = page['content']['raw'] if 'raw' in page.get('content', {}) else page['content']['rendered']
          with open('new_cve.html') as f:
            new_cve = f.read()
          replacement = (
            '    <!-- CVE_SECTION_START -->\n'
            '    <div class="aks-tab-panel" id="aks-tab-cve">\n'
            '      <h2>AKS CVE Security</h2>\n'
            '      <p>Live vulnerability data for the latest AKS release, sourced from the '
            '<strong>AKS Vulnerability Data API</strong> (Public Preview). Shows unique active CVEs '
            'and improvements from the previous release across all AKS platform containers.</p>\n'
            '      ' + new_cve + '\n'
            '    </div>\n'
            '    <!-- CVE_SECTION_END -->'
          )
          updated = re.sub(
            r'<!--\s*CVE_SECTION_START\s*-->.*?<!--\s*CVE_SECTION_END\s*-->',
            replacement, html, flags=re.DOTALL
          )
          with open('spliced.html', 'w') as f:
            f.write(updated)
          print(f"Splice done. HTML length: {len(updated)}")
          PYEOF

          # Push spliced content back to WordPress
          jq -n --rawfile content spliced.html \
            '{content: "<!-- wp:html -->\n\($content)\n<!-- /wp:html -->", status: "publish"}' \
            > "$RUNNER_TEMP/wp-cve-payload.json"

          curl -sSf -X POST "$WP_URL/wp-json/wp/v2/pages/$WP_ID" \
            -u "$WP_USER:$WP_PASS" \
            -H "Content-Type: application/json" \
            --data-binary @"$RUNNER_TEMP/wp-cve-payload.json"

          echo "CVE section updated on WordPress page."
      # -------------------------------------------------------------------------

      - name: Get current WP page
        id: get
        if: steps.gen.conclusion == 'success'
        run: |
          # Function to retry curl commands with exponential backoff
          retry_curl() {
            local max_retries=3
            local retry_delay=5
            local attempt=1
            while [ $attempt -le $max_retries ]; do
              if "$@"; then
                echo "Successfully executed command on attempt $attempt"
                return 0
              else
                local exit_code=$?
                echo "Attempt $attempt failed with exit code $exit_code"
                if [ $attempt -lt $max_retries ]; then
                  echo "Retrying in $retry_delay seconds..."
                  sleep $retry_delay
                  retry_delay=$((retry_delay * 2))
                else
                  echo "Failed after $max_retries attempts"
                  return $exit_code
                fi
                attempt=$((attempt + 1))
              fi
            done
          }

          retry_curl curl -sSf -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
            "${{ secrets.WP_URL }}/wp-json/wp/v2/pages/${{ secrets.WP_PAGE_ID }}" -o page.json
          echo "current=$(jq -r .content.rendered page.json | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Skip if no changes
        if: steps.gen.conclusion == 'success' && steps.gen.outputs.hash == steps.get.outputs.current
        run: echo "No content changes — skipping WordPress update."

      - name: Update WordPress page
        if: steps.gen.conclusion == 'success' && steps.gen.outputs.hash != steps.get.outputs.current
        run: |
          # Function to retry curl commands with exponential backoff
          retry_curl() {
            local max_retries=3
            local retry_delay=5
            local attempt=1
            while [ $attempt -le $max_retries ]; do
              if "$@"; then
                echo "Successfully executed command on attempt $attempt"
                return 0
              else
                local exit_code=$?
                echo "Attempt $attempt failed with exit code $exit_code"
                if [ $attempt -lt $max_retries ]; then
                  echo "Retrying in $retry_delay seconds..."
                  sleep $retry_delay
                  retry_delay=$((retry_delay * 2))
                else
                  echo "Failed after $max_retries attempts"
                  return $exit_code
                fi
                attempt=$((attempt + 1))
              fi
            done
          }

          WP_API="${{ secrets.WP_URL }}/wp-json/wp/v2/pages/${{ secrets.WP_PAGE_ID }}"
          jq -n --rawfile content content.html \
            '{content: "<!-- wp:html -->\n\($content)\n<!-- /wp:html -->", status: "publish"}' \
            > "$RUNNER_TEMP/wp-payload.json"

          retry_curl curl -sSf -X POST "$WP_API" \
            -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
            -H "Content-Type: application/json" \
            --data-binary @"$RUNNER_TEMP/wp-payload.json"

      - name: Archive weekly digest
        if: github.event.schedule == '0 9 * * 0' || github.event.inputs.post_weekly_digest == 'true'
        run: |
          # Create archive directory
          mkdir -p archive

          # Save digest with date in filename
          ARCHIVE_DATE=$(date +%Y-%m-%d)
          cp digest.html "archive/weekly-digest-$ARCHIVE_DATE.html"
          echo "Saved digest to archive/weekly-digest-$ARCHIVE_DATE.html"

          # Commit and push archive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "archive/weekly-digest-$ARCHIVE_DATE.html"
          if git diff --staged --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "Archive weekly digest for $ARCHIVE_DATE"
            git push
          fi

      - name: Create weekly WP post
        if: github.event.schedule == '0 9 * * 0' || github.event.inputs.post_weekly_digest == 'true'
        run: |
          if [ ! -s digest.html ]; then
            echo "No digest content — skipping weekly post."
            exit 0
          fi

          # Function to retry curl commands with exponential backoff
          retry_curl() {
            local max_retries=3
            local retry_delay=5
            local attempt=1
            while [ $attempt -le $max_retries ]; do
              if "$@"; then
                echo "Successfully executed command on attempt $attempt"
                return 0
              else
                local exit_code=$?
                echo "Attempt $attempt failed with exit code $exit_code"
                if [ $attempt -lt $max_retries ]; then
                  echo "Retrying in $retry_delay seconds..."
                  sleep $retry_delay
                  retry_delay=$((retry_delay * 2))
                else
                  echo "Failed after $max_retries attempts"
                  return $exit_code
                fi
                attempt=$((attempt + 1))
              fi
            done
          }

          WP_API="${{ secrets.WP_URL }}/wp-json/wp/v2/posts"
          TITLE=$(cat digest.title)

          jq -n --rawfile content digest.html --arg title "$TITLE" \
            '{title: $title,
              status: "publish",
              categories: [261],
              content: "<!-- wp:html -->\n\($content)\n<!-- /wp:html -->",
              comment_status: "closed"}' \
            > "$RUNNER_TEMP/wp-weekly.json"

          retry_curl curl -sSf -X POST "$WP_API" \
            -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
            -H "Content-Type: application/json" \
            --data-binary @"$RUNNER_TEMP/wp-weekly.json"
