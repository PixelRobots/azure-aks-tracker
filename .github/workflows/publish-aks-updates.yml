# .github/workflows/publish-aks-updates.yml
name: Publish AKS updates to WordPress (PowerShell)

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours for page updates
    - cron: '0 6 * * *'     # Daily 06:00 UTC — includes VHD CVE refresh
    - cron: '0 9 * * 0'     # Sunday 09:00 UTC for weekly digest
  workflow_dispatch:
    inputs:
      post_weekly_digest:
        description: 'Post Weekly Digest to WordPress'
        required: false
        type: boolean
        default: false
      refresh_cve_data:
        description: 'Refresh CVE data (AKS releases + VHD node images)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # Allow pushing archive files back to repository
  models: read     # Allow calling GitHub Models inference API

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell 7 is preinstalled
        run: pwsh -v

      - name: Generate HTML JSON (content + hash)
        id: gen
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OpenAIKey: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_APIURI:       ${{ secrets.AZURE_OPENAI_APIURI }}
          AZURE_OPENAI_KEY:          ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_API_VERSION:  ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT:   ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          # CVE_ONLY=true skips GitHub/docs/AI fetch and regenerates only the CVE section.
          # Enabled when the refresh_cve_data checkbox is ticked manually.
          CVE_ONLY: ${{ github.event.inputs.refresh_cve_data == 'true' && 'true' || '' }}
          # CVE_REFRESH_VHD=true fetches VHD node-image CVE data (26 OS types) in addition to
          # the standard container-image CVE data. When unset, only container-image CVEs are fetched.
          # Enabled automatically on the daily 06:00 UTC schedule or when the checkbox is ticked.
          CVE_REFRESH_VHD: ${{ (github.event.schedule == '0 6 * * *' || github.event.inputs.refresh_cve_data == 'true') && 'true' || '' }}
        run: |
          ./.github/scripts/generate-aks-updates.ps1 1> out.json
          Write-Host "Generated out.json ($((Get-Item out.json).Length) bytes)"
          $json = Get-Content out.json -Raw | ConvertFrom-Json
          if ($json.cve_only) {
            Set-Content -LiteralPath cve-section.html -Value $json.cve_section_html -Encoding UTF8
            Add-Content -Path $env:GITHUB_OUTPUT -Value "cve_only=true"
          } else {
            Set-Content -LiteralPath content.html        -Value $json.html                 -Encoding UTF8
            Set-Content -LiteralPath digest-docs.html    -Value $json.digest_docs_html     -Encoding UTF8
            Set-Content -LiteralPath digest-docs.title   -Value $json.digest_docs_title    -Encoding UTF8
            Set-Content -LiteralPath digest-releases.html -Value $json.digest_releases_html -Encoding UTF8
            Set-Content -LiteralPath digest-releases.title -Value $json.digest_releases_title -Encoding UTF8
            Set-Content -LiteralPath digest-cve.html     -Value $json.digest_cve_html      -Encoding UTF8
            Set-Content -LiteralPath digest-cve.title    -Value $json.digest_cve_title     -Encoding UTF8
            Add-Content -Path $env:GITHUB_OUTPUT -Value "hash=$($json.hash)"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "cve_only=false"
          }

      - name: Commit VHD cache
        if: steps.gen.conclusion == 'success'
        run: |
          if [ -f vhd-cache.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add vhd-cache.json
            if git diff --staged --quiet; then
              echo "VHD cache unchanged — nothing to commit."
            else
              git commit -m "chore: update VHD CVE cache [skip ci]"
              git push
              echo "VHD cache committed and pushed."
            fi
          else
            echo "No vhd-cache.json produced — skipping cache commit."
          fi

      - name: Get current WP page
        id: get
        if: steps.gen.conclusion == 'success'
        run: |
          # Function to retry curl commands with exponential backoff
          retry_curl() {
            local max_retries=3
            local retry_delay=5
            local attempt=1
            while [ $attempt -le $max_retries ]; do
              if "$@"; then
                echo "Successfully executed command on attempt $attempt"
                return 0
              else
                local exit_code=$?
                echo "Attempt $attempt failed with exit code $exit_code"
                if [ $attempt -lt $max_retries ]; then
                  echo "Retrying in $retry_delay seconds..."
                  sleep $retry_delay
                  retry_delay=$((retry_delay * 2))
                else
                  echo "Failed after $max_retries attempts"
                  return $exit_code
                fi
                attempt=$((attempt + 1))
              fi
            done
          }

          retry_curl curl -sSf -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
            "${{ secrets.WP_URL }}/wp-json/wp/v2/pages/${{ secrets.WP_PAGE_ID }}" -o page.json
          echo "current=$(jq -r .content.rendered page.json | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Skip if no changes
        if: steps.gen.conclusion == 'success' && steps.gen.outputs.cve_only != 'true' && steps.gen.outputs.hash == steps.get.outputs.current
        run: echo "No content changes — skipping WordPress update."

      - name: Update WordPress page
        if: steps.gen.conclusion == 'success' && steps.gen.outputs.cve_only != 'true' && steps.gen.outputs.hash != steps.get.outputs.current
        run: |
          # Function to retry curl commands with exponential backoff
          retry_curl() {
            local max_retries=3
            local retry_delay=5
            local attempt=1
            while [ $attempt -le $max_retries ]; do
              if "$@"; then
                echo "Successfully executed command on attempt $attempt"
                return 0
              else
                local exit_code=$?
                echo "Attempt $attempt failed with exit code $exit_code"
                if [ $attempt -lt $max_retries ]; then
                  echo "Retrying in $retry_delay seconds..."
                  sleep $retry_delay
                  retry_delay=$((retry_delay * 2))
                else
                  echo "Failed after $max_retries attempts"
                  return $exit_code
                fi
                attempt=$((attempt + 1))
              fi
            done
          }

          WP_API="${{ secrets.WP_URL }}/wp-json/wp/v2/pages/${{ secrets.WP_PAGE_ID }}"
          jq -n --rawfile content content.html \
            '{content: "<!-- wp:html -->\n\($content)\n<!-- /wp:html -->", status: "publish"}' \
            > "$RUNNER_TEMP/wp-payload.json"

          retry_curl curl -sSf -X POST "$WP_API" \
            -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
            -H "Content-Type: application/json" \
            --data-binary @"$RUNNER_TEMP/wp-payload.json"

      - name: Update WordPress CVE section only
        if: steps.gen.conclusion == 'success' && steps.gen.outputs.cve_only == 'true'
        shell: pwsh
        run: |
          $WpApi   = "${{ secrets.WP_URL }}/wp-json/wp/v2/pages/${{ secrets.WP_PAGE_ID }}"
          $authB64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}"))
          $headers = @{ Authorization = "Basic $authB64" }

          # Fetch current page raw content (requires edit context)
          $pageData   = Invoke-RestMethod -Uri "${WpApi}?context=edit" -Headers $headers -Method GET -TimeoutSec 30
          $rawContent = $pageData.content.raw

          if (-not $rawContent) {
            Write-Error "Could not retrieve raw page content from WordPress. Aborting CVE section update."
            exit 1
          }

          # Read the pre-built CVE section HTML produced by the script
          $newSection = Get-Content cve-section.html -Raw

          # Replace the CVE section between the start/end markers.
          # The \s* around marker names allows for minor spacing variations in the page.
          $updated = [regex]::Replace(
            $rawContent,
            '(?s)<!--\s*CVE_SECTION_START\s*-->.*?<!--\s*CVE_SECTION_END\s*-->',
            [System.Text.RegularExpressions.MatchEvaluator]{ param($m) $newSection }
          )

          if ($updated -eq $rawContent) {
            Write-Warning "CVE section markers (<!-- CVE_SECTION_START/END -->) not found in WordPress page — no update performed. Verify markers exist in the page if CVE updates are expected."
            exit 0
          }

          $body = @{ content = $updated; status = 'publish' } | ConvertTo-Json -Depth 3 -Compress
          $postHeaders = $headers + @{ 'Content-Type' = 'application/json' }
          Invoke-RestMethod -Uri $WpApi -Headers $postHeaders -Method POST -Body $body -TimeoutSec 30
          Write-Host "CVE section updated successfully in WordPress."

      - name: Archive weekly digests
        if: github.event.schedule == '0 9 * * 0' || github.event.inputs.post_weekly_digest == 'true'
        run: |
          # Create archive directory
          mkdir -p archive

          # Save each digest with date in filename
          ARCHIVE_DATE=$(date +%Y-%m-%d)
          for TYPE in docs releases cve; do
            SRC="digest-${TYPE}.html"
            DST="archive/weekly-digest-${TYPE}-${ARCHIVE_DATE}.html"
            if [ ! -f "$SRC" ]; then
              echo "Skipping $TYPE: file $SRC not found."
            elif [ ! -s "$SRC" ]; then
              echo "Skipping $TYPE: file $SRC is empty."
            else
              cp "$SRC" "$DST"
              echo "Saved $SRC to $DST"
            fi
          done

          # Commit and push archive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --staged --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "Archive weekly digests for $ARCHIVE_DATE"
            git push
          fi

      - name: Create weekly WP posts
        if: github.event.schedule == '0 9 * * 0' || github.event.inputs.post_weekly_digest == 'true'
        run: |
          # Function to retry curl commands with exponential backoff
          retry_curl() {
            local max_retries=3
            local retry_delay=5
            local attempt=1
            while [ $attempt -le $max_retries ]; do
              if "$@"; then
                echo "Successfully executed command on attempt $attempt"
                return 0
              else
                local exit_code=$?
                echo "Attempt $attempt failed with exit code $exit_code"
                if [ $attempt -lt $max_retries ]; then
                  echo "Retrying in $retry_delay seconds..."
                  sleep $retry_delay
                  retry_delay=$((retry_delay * 2))
                else
                  echo "Failed after $max_retries attempts"
                  return $exit_code
                fi
                attempt=$((attempt + 1))
              fi
            done
          }

          WP_API="${{ secrets.WP_URL }}/wp-json/wp/v2/posts"

          post_if_nonempty() {
            local html_file="$1"
            local title_file="$2"
            local label="$3"

            if [ ! -s "$html_file" ]; then
              echo "$label: no content — skipping."
              return 0
            fi

            TITLE=$(cat "$title_file")
            jq -n --rawfile content "$html_file" --arg title "$TITLE" \
              '{title: $title,
                status: "publish",
                categories: [261],
                content: "<!-- wp:html -->\n\($content)\n<!-- /wp:html -->",
                comment_status: "closed"}' \
              > "$RUNNER_TEMP/wp-${label}.json"

            echo "Posting $label digest to WordPress..."
            retry_curl curl -sSf -X POST "$WP_API" \
              -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
              -H "Content-Type: application/json" \
              --data-binary @"$RUNNER_TEMP/wp-${label}.json"
          }

          post_if_nonempty digest-docs.html     digest-docs.title     docs
          post_if_nonempty digest-releases.html digest-releases.title releases
          post_if_nonempty digest-cve.html      digest-cve.title      cve
